name: CI Test suite

on:
  pull_request:
    branches:
      - main
      - release/*
  workflow_dispatch:

env:
  UV_VERSION: 0.5.21

jobs:
  unittests:
    name: Unit Tests Python=${{ matrix.python-version }} Pyspark=${{ matrix.pyspark-version }} Keras=${{ matrix.keras-version }}
    runs-on: [ ubuntu-latest ]
    strategy:
      matrix:
        # Keras 3 supports Python 3.9-3.12 uniformly, no per-version splits needed.
        # We test the floor (3.0), a mid-range, and latest release.
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        pyspark-version: ["3.4.1", "3.5.0"]
        keras-version: ["3.3.0", "3.7.0", "3.10.0", "3.14.0"]
    steps:
      - name: Setup Local Repo
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        run: |
          pip install --upgrade pip
          pip install "uv==$UV_VERSION"
      - name: Fix Python Pyspark & Keras Versions
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv add pyspark==${{ matrix.pyspark-version }}
          uv add keras==${{ matrix.keras-version }}
      - name: Run tests
        run: uv run -p ${{ matrix.python-version }} python -m pytest -n auto .
  formatting:
    name: Formatting Checks
    runs-on: [ ubuntu-latest ]
    steps:
      - name: Setup Local Repo
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install uv
        run: |
          pip install --upgrade pip
          pip install "uv==$UV_VERSION"
      - name: Run formatting checks
        run: make format
  linting:
    name: Linting Checks
    runs-on: [ ubuntu-latest ]
    steps:
      - name: Setup Local Repo
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install uv
        run: |
          pip install --upgrade pip
          pip install "uv==$UV_VERSION"
      - name: Run linting checks
        run: make lint
  licence-header:
    name: License Header Checks
    runs-on: [ ubuntu-latest ]
    steps:
      - name: Setup Local Repo
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Pre-commit
        run: |
          pip install --upgrade pip
          pip install pre-commit
          pre-commit install
      - name: Run Pre-commit
        run: pre-commit run --all-files
  coverage:
    name: Coverage Check
    runs-on: [ ubuntu-latest ]
    steps:
      - name: Setup Local Repo
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install uv
        run: |
          pip install --upgrade pip
          pip install "uv==$UV_VERSION"
      - name: Run coverage report
        run: make test-cov
